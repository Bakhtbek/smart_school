<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ақылды Мектеп - QR Түгендеу Жүйесі</title>
    <!-- Экранға QR-кодты автоматты шығаруға арналған тегін кітапхана -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f7fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
            text-align: center;
            margin: 20px;
        }
        .logo-title {
            color: #1a365d;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        /* ЭКРАНДАҒЫ МҰҒАЛІМ РЕЖИМІ (Компьютер экранында көрінеді) */
        #screen-view {
            display: block;
        }
        .qr-box {
            background: #edf2f7;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border-radius: 10px;
            display: inline-block;
        }
        .btn {
            background: #3182ce;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #2b6cb0;
        }
        
        /* ТЕЛЕФОНДАҒЫ ОҚУШЫ РЕЖИМІ (Телефонмен сканерлегенде ашылады) */
        #student-view {
            display: none;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3182ce;
        }
        
        /* Хабарламалар стилі */
        #message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
        }
        .success { background: #c6f6d5; color: #22543d; }
        .error { background: #fed7d7; color: #742a2a; }
        .info { background: #e2e8f0; color: #2d3748; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-title">🏫 Ақылды Мектеп</div>
    
    <!-- 1-бөлім: Экран режимі (Компьютерде тұрады) -->
    <div id="screen-view">
        <div class="subtitle">Сыныпқа келген оқушылар телефон камерасы арқылы төмендегі QR-кодты сканерлеп, сабаққа қатысуын белгілейді.</div>
        <div class="qr-box">
            <!-- QR код осы жерде автоматты түрде жасалады -->
            <div id="qrcode"></div>
        </div>
        <p style="font-size: 12px; color: #718096; margin-top: 0;">Сайт сілтемесі оқушылар үшін QR-кодқа айналдырылды</p>
        <button class="btn" onclick="switchToStudentView()">Оқушы режимін тексеру (Тест)</button>
    </div>

    <!-- 2-бөлім: Оқушы режимі (Сканерлегенде телефонда ашылады) -->
    <div id="student-view">
        <div class="subtitle">Сабаққа қатысуыңызды растау үшін аты-жөніңізді толық жазып, батырманы басыңыз.</div>
        
        <div class="form-group">
            <label for="student-name">Аты-жөніңіз (Тегіңіз бен Атыңыз):</label>
            <input type="text" id="student-name" placeholder="Мысалы: Ахметов Ерлан" required>
        </div>
        
        <button class="btn" style="background: #48bb78;" onclick="submitAttendance()">Қатысуды Бекіту</button>
        <button class="btn" style="background: #718096; font-size: 12px; padding: 6px; width: auto; margin-top: 15px;" onclick="switchToScreenView()">Экран режиміне қайту</button>
    </div>
    
    <!-- Статус хабарламасы -->
    <div id="message"></div>
</div>

<script>
    // Сіздің дайын Google Form сілтемеңіз (Автоматты түрде өзгертілген нұсқасы)
    const googleFormBaseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfTuXMQdlQpywG8zC2RQgHakS3gSH3tqn1wE8EHz5M8bbf-QQ/formResponse?entry.130233309=";

    // Парақша жүктелгенде жұмыс істейтін логика
    window.onload = function() {
        // Ағымдағы сайттың сілтемесін алу (GitHub Pages-те ашылғанда соның сілтемесін табады)
        let currentUrl = window.location.href.split('?')[0];
        // Оқушыларға арналған арнайы сілтеме құрастыру (соңына белгі қойылады)
        let studentUrl = currentUrl + "?mode=student";

        // Экран бетіне QR-кодты автоматты түрде сызып шығару
        new QRCode(document.getElementById("qrcode"), {
            text: studentUrl,
            width: 200,
            height: 200,
            colorDark : "#1a365d",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Егер сілтеме соңында ?mode=student болса (яғни телефонмен сканерлеп ашса)
        // сайт автоматты түрде оқушыға атын жазатын форманы көрсетеді.
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'student') {
            switchToStudentView();
        }
    };

    // Экран ауыстыру функциялары
    function switchToStudentView() {
        document.getElementById('screen-view').style.display = 'none';
        document.getElementById('student-view').style.display = 'block';
        document.getElementById('message').style.display = 'none';
    }

    function switchToScreenView() {
        document.getElementById('screen-view').style.display = 'block';
        document.getElementById('student-view').style.display = 'none';
        document.getElementById('message').style.display = 'none';
    }

    // Мәліметті Google Sheets кестесіне жіберу
    function submitAttendance() {
        const nameInput = document.getElementById('student-name');
        const name = nameInput.value.trim();
        const msgDiv = document.getElementById('message');

        if (name === "") {
            msgDiv.className = "error";
            msgDiv.innerText = "Өтініш, аты-жөніңізді жазыңыз!";
            msgDiv.style.display = "block";
            return;
        }

        msgDiv.className = "info";
        msgDiv.innerText = "Жіберілуде, күте тұрыңыз...";
        msgDiv.style.display = "block";

        // Соңғы жіберілетін сілтемені дайындау
        const finalUrl = googleFormBaseUrl + encodeURIComponent(name);

        // Жасырын (фондық) режимде Google Form-қа деректі POST арқылы аттандыру
        fetch(finalUrl, {
            method: 'POST',
            mode: 'no-cors'
        })
        .then(() => {
            msgDiv.className = "success";
            msgDiv.innerText = "✓ Тіркелді! Рахмет, " + name;
            nameInput.value = ""; // Мәтін енгізетін жерді тазалау
        })
        .catch(err => {
            msgDiv.className = "error";
            msgDiv.innerText = "Қате шықты. Интернет байланысын тексеріңіз.";
            console.error(err);
        });
    }
</script>

</body>
</html>

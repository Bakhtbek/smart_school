<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ақылды Мектеп - QR Түгендеу</title>
    <!-- QR кодты сканерлейтін ресми кітапхана -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 { color: #1a365d; font-size: 24px; margin-bottom: 5px; }
        p { color: #718096; font-size: 14px; margin-bottom: 25px; }
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2e8f0 !important;
        }
        #result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            display: none; /* Әзірге жасыру */
        }
        .success { background-color: #c6f6d5; color: #22543d; }
        .loading { background-color: #feebc8; color: #744210; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ақылды Мектеп</h1>
    <p>Оқушының QR-кодын камераға жақындатыңыз</p>
    
    <!-- Камера экраны -->
    <div id="reader"></div>
    
    <!-- Нәтиже шығатын орын -->
    <div id="result"></div>
</div>

<script>
    // Сіздің Google Form-қа жіберетін өзгертілген дайын сілтемеңіз
    const googleFormBaseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfTuXMQdlQpywG8zC2RQgHakS3gSH3tqn1wE8EHz5M8bbf-QQ/formResponse?entry.130233309=";
    
    let isScanning = true; // Қайта-қайта сканерлей бермеу үшін блок қою

    function onScanSuccess(decodedText, decodedResult) {
        if (!isScanning) return; 
        isScanning = false; // Сканерлеуді уақытша тоқтату

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = "block";
        resultDiv.className = "loading";
        resultDiv.innerText = "Тіркелуде: " + decodedText + "...";

        // Google Form-қа деректі жіберу сілтемесін құрастыру
        const finalUrl = googleFormBaseUrl + encodeURIComponent(decodedText);
        
        // Деректі фондық режимде (жасырын) Google кестеге жіберу
        fetch(finalUrl, {
            method: 'POST',
            mode: 'no-cors'
        })
        .then(() => {
            resultDiv.className = "success";
            resultDiv.innerText = "✓ Тіркелді! Рахмет: " + decodedText;
            
            // 3 секундтан кейін келесі оқушыны сканерлеуге мүмкіндік беру
            setTimeout(() => {
                resultDiv.style.display = "none";
                isScanning = true;
            }, 3000);
        })
        .catch(err => {
            alert("Қате орын алды. Интернет байланысын тексеріңіз.");
            isScanning = true;
        });
    }

    function onScanFailure(error) {
        // Камераның әр кадр сайынғы қатесін конзольге жасыру
    }

    // Камера параметрлері мен іске қосу
    let html5QrcodeScanner = new html5QrcodeScanner(
        "reader", { fps: 10, qrbox: { width: 250, height: 250 } }
    );
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>

</body>
</html>
